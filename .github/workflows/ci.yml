name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:    # pour le job slow / nightly

jobs:
  # ----------------------------------------------------------------------
  # 1. lint + unit  (rapide, tourne sur chaque PR)
  # ----------------------------------------------------------------------
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest unit
        run: pytest tests/unit -ra -q

  # ----------------------------------------------------------------------
  # 2. intégration  (testcontainers Postgres)
  # ----------------------------------------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests (excluding slow)
        run: pytest tests/integration -ra -q -m "not slow"

  # ----------------------------------------------------------------------
  # 3. sql-lint  (sqlfluff sur les modèles dbt)
  # ----------------------------------------------------------------------
  sql-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install sqlfluff
        run: pip install sqlfluff==3.3.0 sqlfluff-templater-dbt==3.3.0
      - name: Lint dbt models
        run: |
          cd dbt
          sqlfluff lint models/ --dialect postgres --exclude-rules AM04,LT05,ST05,RF02,RF04,CV02 || true
          # Soft-fail : les erreurs de lint SQL sont remontées sans bloquer le pipeline.

  # ----------------------------------------------------------------------
  # 4. slow  (manuel : build dbt complet + entraînement + Evidently, long)
  # ----------------------------------------------------------------------
  slow:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install (incl. ML)
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run slow tests
        run: pytest tests/integration -ra -q -m slow
