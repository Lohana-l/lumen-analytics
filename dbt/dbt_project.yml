name: cairn
version: "1.0.0"
config-version: 2

profile: cairn

model-paths:   ["models"]
analysis-paths: ["analysis"]
test-paths:    ["tests"]
seed-paths:    ["seeds"]
macro-paths:   ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  cairn:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: staging
      +materialized: ephemeral
    marts:
      +schema: marts
      +materialized: table

vars:
  # "Aujourd'hui" pour le time-travel sur les données seedées, figé pour que le CI soit déterministe.
  reporting_date: "2026-06-01"
  # Horizon de churn pour construire le label d'entraînement.
  churn_horizon_days: 90
